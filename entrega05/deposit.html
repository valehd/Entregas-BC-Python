<!-- deposit.html-->
<!DOCTYPE html>
<html>
<head>
    <title>Wallet - Depositar</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
        body {
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container p-4 border rounded shadow-sm">
     <h2 class="text-center mb-4">Depositar</h2>

    <div class="form-group text-center mb-3">
        <div class="form-group mb-4">
        <label for="depositAmount">Monto a depositar:</label>
        <input type="number"  class="form-control" id="depositAmount" placeholder="Enter amount">
        </div>
        <button class="btn btn-primary mb-3 " id="depositar">Realizar depósito</button>
        <div id="alert-container"></div>

<p id="mensajeDeposito" class="mt-3"></p>

<p>Saldo actual: $<span id="balance"></span></p>

        <a href="menu.html" class="btn btn-secondary">Volver al Menú Principal</a>
    </div>

    <script>

$(document).ready(function () {

    let balance = Number(localStorage.getItem("balance")) || 0;
    $("#balance").text(balance.toLocaleString("es-CL"));

    $("#depositar").click(function () {

        let monto = Number($("#depositAmount").val());

        if (monto <= 0) {
            alert("Ingrese un monto válido.");
            return;
        }

        balance += monto;

        localStorage.setItem("balance", balance);

        $("#mensajeDeposito").text("Se depositaron $" + monto.toLocaleString("es-CL"));

        $("#alert-container").html(`
            <div class="alert alert-success mt-3">
                Depósito realizado correctamente.
            </div>
        `);

        setTimeout(function () {
            window.location.href = "menu.html";
        }, 2000);

    });

});
        
       
    </script>
</body>
</html>
