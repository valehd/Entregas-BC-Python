
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depositar</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width: 350px;">

        <h2 class="text-center mb-4">Depositar</h2>

        <form action="depositar">

            <div class="form-group">
                <label for="monto">Monto a depositar:</label>
                <input type="number" id="monto" name="monto" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Realizar Depósito
            </button>

        </form>

        <a href="menu.html" class="btn btn-secondary btn-block mt-2">
            Menú
        </a>

    </div>

</div>

</body>
</html>
